<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vail Spring 2026 Restaurant Guide</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: Arial, Helvetica, sans-serif;
    background: #ffffff;
    color: #111111;
    max-width: 100%;
    margin: 0 auto;
    padding: 0 0 40px 0;
    font-size: 14px;
    line-height: 1.5;
  }

  /* ── HEADER ── */
  .header {
    border-bottom: 3px solid #111;
    padding: 20px 0 14px 0;
    margin-bottom: 16px;
  }
  .header-eyebrow {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 4px;
  }
  .header h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: #111;
    margin-bottom: 3px;
  }
  .header-sub {
    font-size: 11px;
    font-weight: 400;
    font-style: italic;
    color: #666;
  }

  /* ── DATE CONTROL ── */
  .date-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    background: #f5f5f5;
    border: 1px solid #ddd;
    padding: 9px 12px;
    margin-bottom: 12px;
    cursor: pointer;
    user-select: none;
  }
  .date-bar:hover { background: #eeeeee; }
  .date-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #888;
    flex-shrink: 0;
  }
  .date-value {
    font-size: 13px;
    font-weight: 700;
    color: #111;
    flex: 1;
  }
  .date-edit {
    font-size: 10px;
    font-style: italic;
    color: #999;
    flex-shrink: 0;
  }

  /* Date picker modal */
  .modal-overlay {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 1000;
    align-items: flex-start;
    justify-content: center;
    padding-top: 60px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #fff;
    border: 2px solid #111;
    padding: 20px;
    width: 280px;
    max-width: 90%;
  }
  .modal-title {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 12px;
    color: #111;
  }
  .modal input[type="date"] {
    width: 100%;
    padding: 9px;
    border: 1px solid #ccc;
    font-family: Arial, Helvetica, sans-serif;
    font-size: 14px;
    color: #111;
    margin-bottom: 12px;
    outline: none;
  }
  .modal input[type="date"]:focus { border-color: #111; }
  .modal-buttons { display: flex; gap: 8px; }
  .modal-btn {
    flex: 1;
    padding: 9px;
    border: 1px solid #111;
    font-family: Arial, Helvetica, sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    cursor: pointer;
    background: #fff;
    color: #111;
  }
  .modal-btn.primary { background: #111; color: #fff; }
  .modal-btn:hover { opacity: 0.8; }

  /* ── SEARCH ── */
  .search-wrap { margin-bottom: 10px; position: relative; }
  .search-wrap input {
    width: 100%;
    padding: 9px 34px 9px 11px;
    border: 1px solid #ccc;
    font-family: Arial, Helvetica, sans-serif;
    font-size: 14px;
    color: #111;
    outline: none;
    background: #fff;
  }
  .search-wrap input:focus { border-color: #111; }
  .search-clear {
    position: absolute;
    right: 10px; top: 50%;
    transform: translateY(-50%);
    background: none; border: none;
    font-size: 16px; color: #aaa;
    cursor: pointer; display: none;
    line-height: 1;
  }
  .search-clear.visible { display: block; }
  .search-clear:hover { color: #111; }

  /* ── FILTERS ── */
  .filters {
    display: flex;
    gap: 5px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }
  .filter-btn {
    padding: 5px 12px;
    border: 1px solid #ccc;
    background: #fff;
    font-family: Arial, Helvetica, sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: #666;
    cursor: pointer;
  }
  .filter-btn:hover { border-color: #111; color: #111; }
  .filter-btn.active { background: #111; border-color: #111; color: #fff; }

  /* ── OPEN NOW TOGGLE ── */
  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-top: 1px solid #eee;
    border-bottom: 1px solid #eee;
    padding: 9px 0;
    margin-bottom: 12px;
  }
  .toggle-text-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: #111;
  }
  .toggle-text-sub {
    font-size: 10px;
    font-style: italic;
    color: #888;
    margin-top: 1px;
  }
  .toggle-switch { position: relative; display: inline-block; width: 40px; height: 22px; flex-shrink: 0; }
  .toggle-switch input { opacity: 0; width: 0; height: 0; }
  .toggle-track {
    position: absolute; inset: 0;
    background: #ddd;
    cursor: pointer;
    transition: background 0.2s;
  }
  .toggle-track::before {
    content: '';
    position: absolute;
    width: 16px; height: 16px;
    left: 3px; top: 3px;
    background: #fff;
    transition: transform 0.2s;
  }
  input:checked + .toggle-track { background: #111; }
  input:checked + .toggle-track::before { transform: translateX(18px); }

  /* ── RESULTS BAR ── */
  .results-bar { margin-bottom: 8px; }
  .results-count {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #888;
  }

  /* ── CARDS ── */
  .restaurant-card {
    border-bottom: 1px solid #e8e8e8;
    padding: 11px 0;
  }
  .restaurant-card:first-child { border-top: 1px solid #e8e8e8; }

  .card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 3px;
  }
  .card-name {
    font-size: 14px;
    font-weight: 700;
    color: #111;
    line-height: 1.3;
  }
  .status-pill {
    flex-shrink: 0;
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 3px 7px;
    margin-top: 2px;
    white-space: nowrap;
  }
  .status-open   { background: #111; color: #fff; }
  .status-closed { background: #fff; color: #bbb; border: 1px solid #ddd; }
  .status-unknown{ background: #fff; color: #888; border: 1px solid #ddd; }

  .card-hours {
    font-size: 12px;
    font-style: italic;
    color: #555;
    margin-bottom: 4px;
    line-height: 1.4;
  }
  .card-note {
    font-size: 10px;
    font-weight: 700;
    color: #888;
    margin-bottom: 5px;
  }
  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .meal-tags { display: flex; gap: 3px; flex-wrap: wrap; }
  .meal-tag {
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: #aaa;
    padding: 2px 5px;
    border: 1px solid #e0e0e0;
  }
  .website-link {
    font-size: 10px;
    font-weight: 700;
    color: #111;
    text-decoration: none;
    letter-spacing: 0.3px;
    border-bottom: 1px solid #111;
    flex-shrink: 0;
    white-space: nowrap;
  }
  .website-link:hover { opacity: 0.5; }
  .no-website {
    font-size: 9px;
    font-style: italic;
    color: #ccc;
    flex-shrink: 0;
  }

  /* ── CLOSED CARD STYLE ── */
  .card-closed .card-name { color: #999; }
  .card-closed .card-hours { color: #bbb; }

  /* ── EMPTY STATE ── */
  .empty {
    text-align: center;
    padding: 40px 20px;
    color: #aaa;
  }
  .empty p { font-style: italic; font-size: 13px; }

  /* ── FOOTER ── */
  .footer {
    margin-top: 20px;
    border-top: 1px solid #eee;
    padding-top: 12px;
    font-size: 10px;
    font-style: italic;
    color: #aaa;
    text-align: center;
  }
  .footer strong { font-weight: 700; font-style: normal; color: #888; }

  /* ── SQUARESPACE CONTAINER ── */
  .vail-guide-wrap {
    position: relative;
    width: 100%;
    max-width: 660px;
    margin: 0 auto;
    padding: 0 4px;
  }
</style>

  </div>

  <!-- FILTERS -->

    </div>

  <!-- RESULTS COUNT -->
  <div class="results-bar">

  <!-- LIST -->
  <div id="restaurantList"></div>

  <div class="footer">
    <strong>Note:</strong> Hours are from the Town of Vail Spring 2026 guide and may change without notice. Always call ahead.
  </div>

</div><!-- end .vail-guide-wrap -->

// ─────────────────────────────────────────────
// CLOSURE LOGIC
// ─────────────────────────────────────────────
function parseClosureRanges(str) {
  if (!str) return [];
  const ranges = [];
  const pat = /(\d{1,2})\/(\d{1,2})[–\-](\d{1,2})\/(\d{1,2})/g;
  let m;
  while ((m = pat.exec(str)) !== null) {
    ranges.push({
      start: new Date(2026, +m[1]-1, +m[2]),
      end:   new Date(2026, +m[3]-1, +m[4])
    });
  }
  return ranges;
}

function isPermanentlyClosed(r) {
  if (!r.closures) return false;
  const c = r.closures.toLowerCase();
  return c.includes('indefinitely') || c.includes('looking for new location') || c.includes('closed for season');
}

function isClosedOnDate(r, date) {
  if (isPermanentlyClosed(r)) return true;
  const d = new Date(date.getFullYear(), date.getMonth(), date.getDate());

  // Parse date ranges from closure string
  for (const {start, end} of parseClosureRanges(r.closures || '')) {
    if (d >= start && d <= end) return true;
  }

  // Per-restaurant special cases not capturable by simple date ranges
  switch (r.name) {
    case "The Belle":
      if (d >= new Date(2026,2,28) && d <= new Date(2026,3,13)) return true;
      if (d >= new Date(2026,3,19) && d <= new Date(2026,4,19)) return true;
      break;
    case "Pepi's":
      // Closing after lunch 4/19, reopens 5/15
      if (d >= new Date(2026,3,19) && d < new Date(2026,4,15)) return true;
      break;
    case "Vendetta's":
      // Closed 4/20 for 2 weeks = 4/20–5/3
      if (d >= new Date(2026,3,20) && d <= new Date(2026,4,3)) return true;
      break;
    case "Rimini":
      // Closes noon 4/12, reopens end of May
      if (d >= new Date(2026,3,12) && d <= new Date(2026,4,31)) return true;
      break;
    case "Garfinkel's":
      // Closes with mountain ~4/20, reopens Memorial Day 5/25
      if (d >= new Date(2026,3,20) && d < new Date(2026,4,25)) return true;
      break;
    case "Tavern on the Square":
      if (d >= new Date(2026,2,27) && d <= new Date(2026,5,4)) return true;
      break;
    case "Sweet Basil":
      if (d >= new Date(2026,3,15) && d <= new Date(2026,4,7)) return true;
      break;
    case "Two Arrows Coffee":
      if (d >= new Date(2026,3,14) && d <= new Date(2026,4,7)) return true;
      break;
    case "Unravel Coffee – Gravity Haus":
      if (d >= new Date(2026,3,19) && d <= new Date(2026,4,14)) return true;
      break;
    case "La Nonna":
      if (d >= new Date(2026,3,16) && d <= new Date(2026,5,2)) return true;
      break;
    case "La Tour":
      if (d >= new Date(2026,3,15) && d <= new Date(2026,5,17)) return true;
      break;
    case "Left Bank":
      if (d >= new Date(2026,3,12) && d <= new Date(2026,5,10)) return true;
      break;
    case "Matsuhisa":
      if (d.getTime() === new Date(2026,3,13).getTime()) return true;
      break;
    case "Kings Club – The Sonnenalp":
      if (d >= new Date(2026,3,20) && d <= new Date(2026,5,5)) return true;
      break;
    case "Gambit – The Sebastian":
      if (d >= new Date(2026,3,18) && d <= new Date(2026,4,20)) return true;
      break;
    case "Grill on the Gore":
      // Closed until 5/15
      if (d < new Date(2026,4,15)) return true;
      break;
    case "Yama Sushi":
      // Closed 4/12–beginning of June — treat as 4/12–6/1
      if (d >= new Date(2026,3,12) && d <= new Date(2026,5,1)) return true;
      break;
    case "AlpenDogs":
      if (d >= new Date(2026,3,13) && d <= new Date(2026,4,21)) return true;
      break;
    case "Vintage":
      if (d >= new Date(2026,3,13) && d <= new Date(2026,4,7)) return true;
      break;
  }

  // Four Seasons properties: property closed 4/22–5/19
  if (r.closures && r.closures.includes('4/22') && r.closures.includes('5/19')) {
    if (d >= new Date(2026,3,22) && d <= new Date(2026,4,19)) return true;
  }

  // Annapurna: closed 4/13 onward (remodel)
  if (r.name === 'Annapurna' && d >= new Date(2026,3,13)) return true;

  return false;
}

function getStatus(r, date) {
  if (isClosedOnDate(r, date)) return 'closed';
  const c = (r.closures || '').toLowerCase();
  const h = (r.hours || '').toLowerCase();
  if (c.includes('tbd') || h.includes('call for') || h.includes('hours tba') || c.includes('call to confirm')) return 'unknown';
  return 'open';
}

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let selectedDate = new Date();
let activeMeal = 'all';

function formatDateDisplay(d) {
  return d.toLocaleDateString('en-US', {weekday:'long', month:'long', day:'numeric', year:'numeric'});
}
function formatDateInput(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function updateDateDisplay() {
  document.getElementById('dateDisplay').textContent = formatDateDisplay(selectedDate);
}
function openDateModal() {
  document.getElementById('datePicker').value = formatDateInput(selectedDate);
  document.getElementById('dateModal').classList.add('open');
}
function closeDateModal() {
  document.getElementById('dateModal').classList.remove('open');
}
function applyDate() {
  const val = document.getElementById('datePicker').value;
  if (val) {
    const [y,m,d] = val.split('-').map(Number);
    selectedDate = new Date(y, m-1, d);
    updateDateDisplay();
    filterAll();
  }
  closeDateModal();
}
function jumpToToday() {
  selectedDate = new Date();
  document.getElementById('datePicker').value = formatDateInput(selectedDate);
  updateDateDisplay();
  filterAll();
  closeDateModal();
}
document.getElementById('dateModal').addEventListener('click', function(e) {
  if (e.target === this) closeDateModal();
});

function setMeal(meal, btn) {
  activeMeal = meal;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterAll();
}
function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('clearBtn').classList.remove('visible');
  filterAll();
}

function filterAll() {
  const query = document.getElementById('searchInput').value.trim().toLowerCase();
  const openOnly = document.getElementById('openNowToggle').checked;
  document.getElementById('clearBtn').classList.toggle('visible', query.length > 0);
  document.getElementById('toggleSub').textContent = openOnly
    ? `Filtered for ${formatDateDisplay(selectedDate)}`
    : 'Showing all restaurants';

  const filtered = restaurants.filter(r => {
    if (activeMeal !== 'all' && !r.meals.includes(activeMeal)) return false;
    if (query && !r.name.toLowerCase().includes(query)) return false;
    if (openOnly && getStatus(r, selectedDate) !== 'open') return false;
    return true;
  });

  filtered.sort((a, b) => {
    const order = {open:0, unknown:1, closed:2};
    const diff = order[getStatus(a,selectedDate)] - order[getStatus(b,selectedDate)];
    return diff !== 0 ? diff : a.name.localeCompare(b.name);
  });

  document.getElementById('countNum').textContent = filtered.length;
  const list = document.getElementById('restaurantList');

  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty"><p>No restaurants match your filters.</p></div>`;
    return;
  }

  list.innerHTML = filtered.map(r => {
    const status = getStatus(r, selectedDate);
    const label = status === 'open' ? 'Open' : status === 'closed' ? 'Closed' : 'Call First';
    const note = r.closures ? `<div class="card-note">↳ ${r.closures}</div>` : '';
    const tags = r.meals.map(m => `<span class="meal-tag">${m}</span>`).join('');
    const web = r.url
      ? `<a class="website-link" href="${r.url}" target="_blank" rel="noopener noreferrer">Website ↗</a>`
      : `<span class="no-website">No website</span>`;
    return `<div class="restaurant-card ${status==='closed'?'card-closed':''}">
      <div class="card-top">
        <div class="card-name">${r.name}</div>
        <span class="status-pill status-${status}">${label}</span>
      </div>
      <div class="card-hours">${r.hours}</div>
      ${note}
      <div class="card-footer"><div class="meal-tags">${tags}</div>${web}</div>
    </div>`;
  }).join('');
}

updateDateDisplay();
filterAll();
</script>
